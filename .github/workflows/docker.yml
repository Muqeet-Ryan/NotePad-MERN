name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT CODE ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- DOCKER SETUP ----------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- LOGIN TO DOCKER HUB ----------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- FRONTEND (PROD BUILD) ----------------
      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile.prod \
            -t ${{ secrets.DOCKER_USERNAME }}/notepadmern-frontend:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/notepadmern-frontend:latest

      # ---------------- BACKEND ----------------
      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/notepadmern-backend:latest \
            ./backend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/notepadmern-backend:latest