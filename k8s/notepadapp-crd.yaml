apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: notepadapps.notepad.io
spec:
  group: notepad.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                environment:
                  type: string
                version:
                  type: string
  scope: Namespaced
  names:
    plural: notepadapps
    singular: notepadapp
    kind: NotepadApp